As a consultant, I want to see convergence metrics — total open gaps over time, closure velocity vs creation rate, stale gap detection — so that I can tell whether the project is progressing toward equilibrium or thrashing.

Equilibrium is achieved when all gaps for a given scope are closed or consciously accepted.
