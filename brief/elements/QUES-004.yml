Should capability blocks be one block per capability (Auth is one block) or composable sub-blocks (Email Auth, OAuth, SAML as separate blocks)? Single blocks are simpler to manage but less flexible. Sub-blocks increase combinatorial power but multiply the library's maintenance burden.
