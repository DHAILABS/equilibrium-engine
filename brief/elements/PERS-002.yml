A stakeholder who commissions work through the consultant. Participates in brief capture sessions, reviews and challenges brief elements, reviews derived specifications, approves snapshots, and tracks project progress. Not technical — interacts through business language. Needs transparency into what was agreed, what changed, and why estimates shifted. May be a CTO, product owner, or business sponsor.
