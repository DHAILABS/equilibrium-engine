An AI agent operating as a Claude Code sub-process. Receives structured tickets with context, produces work output to drafts/, generates evidence artifacts, and reports completion. Never writes directly to canonical paths. Stateless — all context comes from the ticket and MCP queries. May be a PM coordinator agent, a worker agent, or a verification agent.
