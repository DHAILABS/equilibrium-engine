As a consultant, I want the derivation engine to automatically route derived elements to the correct spec sub-artifact based on their content — behavior to Functional Spec, quality attributes to NFR, information structures to Data Spec, external boundaries to Integration Spec, environmental constraints to Environment Spec — so that each fact type has one authoritative home.
