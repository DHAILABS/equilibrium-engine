As a consultant, I want to assign tickets to Claude Code worker agents that receive the ticket plus MCP-assembled context and produce output to drafts/ with evidence artifacts and completion reports, so that implementation work is automated while maintaining proposal isolation.

Workers must never write directly to canonical paths.
