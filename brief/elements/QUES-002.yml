Can the PM agent create and assign tickets without consultant approval, or should it propose tickets and wait for approval? Higher autonomy means faster cycles but risks runaway work if gap classification is wrong. The answer likely depends on gap severity — auto-assign for minor gaps, propose-and-wait for blockers.
