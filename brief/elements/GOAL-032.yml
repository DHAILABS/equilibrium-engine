As a consultant, I want to review verified worker output and promote it from drafts/ to canonical paths, triggering gap re-evaluation that may surface new or residual gaps, so that each promotion closes known gaps while detecting any new mismatches introduced.

Blocker-severity items and changes to signed-off artifacts always require explicit consultant approval.
