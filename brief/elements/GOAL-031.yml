As a consultant, I want a verification loop that checks worker output against acceptance criteria using both automated hooks (test suites, linters, schema validation) and agent-based judgment (spec satisfaction, architectural soundness), so that gap closure is evidence-based rather than self-reported.

Hook checks run first (fail-fast); agent checks run only if hooks pass.
