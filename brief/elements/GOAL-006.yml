As a consultant, I want to run a Socratic interview session where the system asks targeted questions to expose assumptions, force prioritisation, and surface unstated constraints, so that a structured brief emerges from conversation rather than requiring a pre-written document.

The system should maintain session continuity — knowing what's settled, flagged, and missing across turns — and checkpoint at natural pauses.
