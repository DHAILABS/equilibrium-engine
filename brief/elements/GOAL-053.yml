As a consultant, I want to filter the gap registry by adjacent pair, mismatch class, severity, status, and direction, and reclassify or close gaps with evidence from within the web UI, so that the gap registry is a working tool rather than a read-only list.

Currently the gaps page just shows a severity-sorted list with no filters or actions.
