As a consultant, I want to trigger spec derivation from a button on the project dashboard that streams progress in real-time (planning phase, element generation, gap detection, git commit) so that I can see the derivation happening and catch issues as they arise.

The derivation page uses server-sent events to stream each plan item, derived element, and detected gap as they are produced.
