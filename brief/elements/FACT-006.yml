The original built-in Equilibrium project has 90 brief elements extracted directly from the roadmap document. These are system-description-level statements ('Typed objects as primary data model') rather than proper user stories ('As a consultant, I want...'). They lack epic grouping, persona references, and the user-story abstraction level needed for meaningful spec derivation.
