As a consultant, I want to trigger a gap scan from the web UI that does LLM-powered semantic comparison between brief and spec elements — detecting not just missing coverage but conflicting claims, ambiguous intent, and unjustified spec elements — so that the gap registry reflects real mismatches, not just structural absence.

Currently gap detection only checks tracesTo.length === 0. This goal requires a proper gap engine with semantic comparison.
