Document upload and guided interview both feed into an LLM-based extraction pipeline (via LiteLLM) that produces typed brief elements with provenance. Elements are saved as YAML files following the canonical schema. Extraction handles goals, personas, constraints, facts, assumptions, terms, and open questions.
