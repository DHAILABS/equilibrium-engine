The primary user of Equilibrium. An independent technology consultant who runs client engagements, captures requirements through discovery sessions, derives specifications, makes architecture decisions, manages the gap registry, and oversees agent-driven implementation work. Operates solo or with a small team. Needs the system to be a force multiplier — handling the structured bookkeeping so the consultant can focus on judgment, client relationships, and design decisions.
