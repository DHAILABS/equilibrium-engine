As a consultant, I want to upload client documents (transcripts, meeting notes, RFPs, emails) so that the system extracts typed brief elements with provenance automatically.

The system should handle messy, unstructured input and produce well-typed elements (goals, personas, constraints, facts, assumptions, questions, terms) at the right abstraction level.
