As a consultant, I want to freeze a versioned snapshot of the brief or spec that records exactly which elements were included, their SHA-256 content hashes, dismissed critiques, parked items, signer identity, and timestamp, so that sign-off is enforceable and scope changes require an explicit amendment cycle.

Snapshots are immutable once signed. The snapshot page shows existing snapshots with integrity verification and element ID lists.
