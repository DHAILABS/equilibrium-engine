As a consultant, I want a readiness assessment that evaluates the brief across dimensions (goal clarity, actor clarity, constraint clarity, conflict resolution, vocabulary quality, acceptance clarity, confidence coverage) so that I know whether the brief is mature enough for formal spec derivation.

Output should be a qualitative judgment: not ready / partially ready / ready for spec derivation / ready for client review.
