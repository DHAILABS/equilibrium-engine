As a consultant, I want to define reusable capability blocks (Auth, Database, File Storage, Search, etc.) that carry content across SABSA architecture layers, composition rules (REQUIRES, SUGGESTS, INCOMPATIBLE, UPGRADES, COMPLICATES), and base complexity estimates, so that future projects can compose from proven patterns rather than designing from scratch.
