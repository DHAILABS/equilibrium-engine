As a consultant, I want to start work from architecture changes (refactoring, tech debt, capability upgrades) that create downstream-ahead gap items propagating upstream toward Spec and Brief, so that not all work has to originate from Brief — but upstream artifacts are never silently mutated.

Architecture-first changes must generate upstream gap items or change proposals, not direct modifications.
